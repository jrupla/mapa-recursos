<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de recursos de adicciones y salud mental de Euskadi</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --verde:#00654A;
    --verde-osc:#004A36;
    --azul:#2662A8;
    --azul-osc:#1C4A80;
    --tinta:#1E2B26;
    --gris:#5C6B64;
    --linea:#DDE4E0;
    --fondo:#F5F7F6;
    --blanco:#FFFFFF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'IBM Plex Sans',system-ui,-apple-system,sans-serif;
    color:var(--tinta);background:var(--fondo);
    display:flex;flex-direction:column;overflow:hidden;
  }
  header{
    background:var(--blanco);border-bottom:3px solid var(--verde);
    padding:10px 18px;display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
  }
  header h1{font-size:17px;font-weight:700;letter-spacing:-.01em}
  header .contador{font-size:13px;color:var(--gris)}
  header .contador strong{color:var(--verde);font-weight:600}
  .cuerpo{flex:1;display:flex;min-height:0}
  aside{
    width:340px;flex-shrink:0;background:var(--blanco);
    border-right:1px solid var(--linea);
    display:flex;flex-direction:column;min-height:0;
  }
  .filtros{padding:14px 16px;border-bottom:1px solid var(--linea);overflow-y:auto;flex-shrink:0;max-height:55%}
  .filtros label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);margin:10px 0 4px}
  .filtros label:first-child{margin-top:0}
  .filtros input[type=text],.filtros select{
    width:100%;padding:7px 9px;font:inherit;font-size:13px;
    border:1px solid var(--linea);border-radius:6px;background:var(--blanco);color:var(--tinta);
  }
  .filtros input[type=text]:focus,.filtros select:focus{outline:2px solid var(--verde);outline-offset:1px;border-color:var(--verde)}
  .fuentes{display:flex;gap:8px;margin-top:2px}
  .chip{
    flex:1;display:flex;align-items:center;gap:7px;cursor:pointer;
    border:1.5px solid var(--linea);border-radius:8px;padding:8px 10px;
    font-size:12.5px;font-weight:500;line-height:1.25;background:var(--blanco);
    transition:border-color .15s, background .15s;user-select:none;
  }
  .chip .punto{width:11px;height:11px;border-radius:50%;flex-shrink:0}
  .chip[data-src=adic] .punto{background:var(--verde)}
  .chip[data-src=rsmb] .punto{background:var(--azul)}
  .chip.activo[data-src=adic]{border-color:var(--verde);background:#E8F2EE}
  .chip.activo[data-src=rsmb]{border-color:var(--azul);background:#E9F0F8}
  .chip:not(.activo){opacity:.55}
  .chip:focus-visible{outline:2px solid var(--tinta);outline-offset:2px}
  .btn-limpiar{
    margin-top:12px;width:100%;padding:7px;font:inherit;font-size:12.5px;font-weight:500;
    border:1px solid var(--linea);border-radius:6px;background:var(--fondo);color:var(--gris);cursor:pointer;
  }
  .btn-limpiar:hover{border-color:var(--gris);color:var(--tinta)}
  .lista-cab{padding:8px 16px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--gris);border-bottom:1px solid var(--linea);background:var(--fondo)}
  .lista{flex:1;overflow-y:auto;min-height:0}
  .item{
    padding:10px 16px;border-bottom:1px solid var(--linea);cursor:pointer;
    border-left:3px solid transparent;
  }
  .item:hover{background:var(--fondo)}
  .item:focus-visible{outline:2px solid var(--verde);outline-offset:-2px}
  .item[data-src=adic]{border-left-color:var(--verde)}
  .item[data-src=rsmb]{border-left-color:var(--azul)}
  .item .nombre{font-size:13px;font-weight:600;line-height:1.3}
  .item .meta{font-size:12px;color:var(--gris);margin-top:2px}
  .vacio{padding:24px 16px;font-size:13px;color:var(--gris);text-align:center}
  #mapa{flex:1;min-width:0}
  /* Popup */
  .leaflet-popup-content{margin:14px 16px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;line-height:1.45;max-width:290px}
  .pop-tag{display:inline-block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:2px 7px;border-radius:4px;margin-bottom:6px;color:#fff}
  .pop-tag.adic{background:var(--verde)}
  .pop-tag.rsmb{background:var(--azul)}
  .pop-nombre{font-size:14px;font-weight:700;margin-bottom:2px}
  .pop-eus{font-size:12px;color:var(--gris);font-style:italic;margin-bottom:6px}
  .pop-fila{margin:3px 0}
  .pop-fila b{font-weight:600}
  .leaflet-popup-content a{color:var(--verde-osc)}
  .pop-etiquetas{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
  .pop-etiquetas span{font-size:11px;background:var(--fondo);border:1px solid var(--linea);border-radius:4px;padding:1px 6px;color:var(--gris)}
  /* Móvil */
  .toggle-filtros{display:none}
  @media (max-width:760px){
    .cuerpo{flex-direction:column}
    aside{width:100%;max-height:45%;border-right:none;border-bottom:1px solid var(--linea)}
    .filtros{max-height:none}
    .lista,.lista-cab{display:none}
    aside.abierta .lista,aside.abierta .lista-cab{display:block}
    aside.abierta .lista{max-height:200px}
    .toggle-filtros{display:block;margin-top:10px;width:100%;padding:7px;font:inherit;font-size:12.5px;border:1px solid var(--linea);border-radius:6px;background:var(--blanco);cursor:pointer}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <h1>Recursos de adicciones y salud mental de Euskadi</h1>
  <span class="contador"><strong id="nres">0</strong> recursos mostrados</span>
</header>
<div class="cuerpo">
  <aside id="panel">
    <div class="filtros">
      <label for="buscar">Buscar</label>
      <input type="text" id="buscar" placeholder="Nombre, municipio o dirección…" autocomplete="off">

      <label>Fuente</label>
      <div class="fuentes">
        <button class="chip activo" data-src="adic" type="button"><span class="punto"></span>Recursos de adicciones</button>
        <button class="chip activo" data-src="rsmb" type="button"><span class="punto"></span>Red Osakidetza</button>
      </div>

      <label for="f-ter">Territorio</label>
      <select id="f-ter"><option value="">Todos</option></select>

      <label for="f-tipo">Tipo de centro o servicio</label>
      <select id="f-tipo"><option value="">Todos</option></select>

      <label for="f-sus">Sustancia o adicción <small>(solo recursos de adicciones)</small></label>
      <select id="f-sus"><option value="">Todas</option></select>

      <label for="f-tit">Titularidad <small>(solo recursos de adicciones)</small></label>
      <select id="f-tit"><option value="">Todas</option></select>

      <button class="btn-limpiar" id="limpiar" type="button">Quitar filtros</button>
      <button class="toggle-filtros" id="toggleLista" type="button">Ver lista de resultados</button>
    </div>
    <div class="lista-cab">Resultados</div>
    <div class="lista" id="lista"></div>
  </aside>
  <div id="mapa"></div>
</div>

// ---------- utilidades ----------
const esc = s => String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');

// ---------- mapa ----------
const mapa = L.map('mapa', {zoomControl:true}).setView([43.05,-2.62], 9);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(mapa);

const cluster = L.markerClusterGroup({maxClusterRadius:45, showCoverageOnHover:false});
mapa.addLayer(cluster);

const COLORES = {adic:'#00654A', rsmb:'#2662A8'};

function popupHtml(d){
  let h = '';
  if(d.src==='adic'){
    h += '<span class="pop-tag adic">Recurso de adicciones</span>';
    h += '<div class="pop-nombre">'+esc(d.n)+'</div>';
    if(d.ne) h += '<div class="pop-eus">'+esc(d.ne)+'</div>';
    if(d.tit) h += '<div class="pop-fila"><b>Titularidad:</b> '+esc(d.tit)+'</div>';
    h += '<div class="pop-fila">'+esc(d.dir)+', '+esc(d.cp)+' '+esc(d.loc)+' ('+esc(d.ter)+')</div>';
    if(d.tel) h += '<div class="pop-fila"><b>Tel.:</b> <a href="tel:'+esc(d.tel.replace(/\s/g,''))+'">'+esc(d.tel)+'</a></div>';
    if(d.em) h += '<div class="pop-fila"><b>Email:</b> <a href="mailto:'+esc(d.em)+'">'+esc(d.em)+'</a></div>';
    if(d.web) h += '<div class="pop-fila"><a href="'+esc(d.web)+'" target="_blank" rel="noopener">Sitio web</a></div>';
    const et = [...(d.sus||[]), ...(d.tipo||[])];
    if(et.length) h += '<div class="pop-etiquetas">'+et.map(x=>'<span>'+esc(x)+'</span>').join('')+'</div>';
  } else {
    h += '<span class="pop-tag rsmb">Osakidetza · '+esc(d.tipoC)+'</span>';
    h += '<div class="pop-nombre">'+esc(d.n)+'</div>';
    h += '<div class="pop-fila">'+esc(d.dir)+'</div>';
    if(d.osi) h += '<div class="pop-fila"><b>OSI:</b> '+esc(d.osi)+'</div>';
    if(d.hosp) h += '<div class="pop-fila"><b>Hospital de referencia:</b> '+esc(d.hosp)+'</div>';
    if(d.hor) h += '<div class="pop-fila"><b>Horario:</b> '+esc(d.hor)+'</div>';
    if(d.tel) h += '<div class="pop-fila"><b>Tel.:</b> <a href="tel:'+esc(d.tel.replace(/\s/g,''))+'">'+esc(d.tel)+'</a></div>';
    if(d.em) h += '<div class="pop-fila"><b>Email:</b> <a href="mailto:'+esc(d.em)+'">'+esc(d.em)+'</a></div>';
  }
  return h;
}

// crear marcadores una sola vez
DATOS.forEach(d => {
  d._txt = norm(d.n+' '+(d.ne||'')+' '+d.loc+' '+d.dir);
  d._m = L.circleMarker([d.lat, d.lon], {
    radius:7, weight:1.5, color:'#fff',
    fillColor: COLORES[d.src], fillOpacity:0.95
  }).bindPopup(popupHtml(d), {maxWidth:310});
});

// ---------- filtros ----------
const fuentes = {adic:true, rsmb:true};
const selTer = document.getElementById('f-ter');
const selTipo = document.getElementById('f-tipo');
const selSus = document.getElementById('f-sus');
const selTit = document.getElementById('f-tit');
const inBuscar = document.getElementById('buscar');

function llenar(sel, valores){
  valores.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
}
llenar(selTer, [...new Set(DATOS.map(d=>d.ter))].sort());
const grpA = document.createElement('optgroup'); grpA.label='Recursos de adicciones';
[...new Set(DATOS.filter(d=>d.src==='adic').flatMap(d=>d.tipo||[]))].sort().forEach(v=>{const o=document.createElement('option');o.value='A|'+v;o.textContent=v;grpA.appendChild(o);});
const grpR = document.createElement('optgroup'); grpR.label='Red Osakidetza';
[...new Set(DATOS.filter(d=>d.src==='rsmb').map(d=>d.tipoC))].sort().forEach(v=>{const o=document.createElement('option');o.value='R|'+v;o.textContent=v;grpR.appendChild(o);});
selTipo.appendChild(grpA); selTipo.appendChild(grpR);
llenar(selSus, [...new Set(DATOS.filter(d=>d.src==='adic').flatMap(d=>d.sus||[]))].sort());
llenar(selTit, [...new Set(DATOS.filter(d=>d.src==='adic').map(d=>d.tit).filter(Boolean))].sort());

function pasa(d){
  if(!fuentes[d.src]) return false;
  if(selTer.value && d.ter!==selTer.value) return false;
  if(selTipo.value){
    const [g,v] = [selTipo.value.slice(0,1), selTipo.value.slice(2)];
    if(g==='A'){ if(d.src!=='adic' || !(d.tipo||[]).includes(v)) return false; }
    else { if(d.src!=='rsmb' || d.tipoC!==v) return false; }
  }
  if(selSus.value && !(d.src==='adic' && (d.sus||[]).includes(selSus.value))) return false;
  if(selTit.value && !(d.src==='adic' && d.tit===selTit.value)) return false;
  const q = norm(inBuscar.value.trim());
  if(q && !d._txt.includes(q)) return false;
  return true;
}

const lista = document.getElementById('lista');
const nres = document.getElementById('nres');

function refrescar(){
  const visibles = DATOS.filter(pasa);
  cluster.clearLayers();
  cluster.addLayers(visibles.map(d=>d._m));
  nres.textContent = visibles.length;
  // lista (limitada para rendimiento)
  lista.innerHTML = '';
  if(!visibles.length){
    lista.innerHTML = '<div class="vacio">Ningún recurso coincide con los filtros. Prueba a ampliar la búsqueda.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  visibles.slice(0,300).forEach(d=>{
    const el = document.createElement('div');
    el.className='item'; el.dataset.src=d.src; el.tabIndex=0;
    el.innerHTML = '<div class="nombre">'+esc(d.n)+'</div><div class="meta">'+esc(d.src==='adic'?(d.tipo||[])[0]||'Recurso de adicciones':d.tipoC)+' · '+esc(d.loc)+'</div>';
    const abrir = ()=>{ mapa.setView([d.lat,d.lon], 15); d._m.openPopup(); };
    el.addEventListener('click', abrir);
    el.addEventListener('keydown', e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();abrir();} });
    frag.appendChild(el);
  });
  if(visibles.length>300){
    const mas=document.createElement('div'); mas.className='vacio';
    mas.textContent='Mostrando los primeros 300 de '+visibles.length+'. Afina los filtros para ver el resto en la lista (el mapa los muestra todos).';
    frag.appendChild(mas);
  }
  lista.appendChild(frag);
}

document.querySelectorAll('.chip').forEach(ch=>{
  ch.addEventListener('click', ()=>{
    fuentes[ch.dataset.src] = !fuentes[ch.dataset.src];
    ch.classList.toggle('activo', fuentes[ch.dataset.src]);
    refrescar();
  });
});
[selTer,selTipo,selSus,selTit].forEach(s=>s.addEventListener('change',refrescar));
let t; inBuscar.addEventListener('input', ()=>{clearTimeout(t); t=setTimeout(refrescar,200);});
document.getElementById('limpiar').addEventListener('click', ()=>{
  inBuscar.value=''; [selTer,selTipo,selSus,selTit].forEach(s=>s.value='');
  fuentes.adic=fuentes.rsmb=true;
  document.querySelectorAll('.chip').forEach(c=>c.classList.add('activo'));
  refrescar();
});
document.getElementById('toggleLista').addEventListener('click', function(){
  const p=document.getElementById('panel');
  p.classList.toggle('abierta');
  this.textContent = p.classList.contains('abierta') ? 'Ocultar lista de resultados' : 'Ver lista de resultados';
});

refrescar();
</script>
